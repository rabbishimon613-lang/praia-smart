<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#F4EFE4">
<title>melhores — praia smart</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --paper:#F4EFE4; --paper-warm:#F9F4E8; --card:#FFFFFF;
  --ink:#1F3F4D; --ink-soft:#577485; --mute:#94A8B4;
  --line:#E6DCC8; --accent:#E8895E;
  --surf:#E8895E; --swim:#5A9FB5; --sun:#E5B86A; --shade:#7C9183;
  --font-sans:"Plus Jakarta Sans",-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;
  --font-serif:"Instrument Serif","Times New Roman",serif;
  --font-mono:"JetBrains Mono",ui-monospace,"SF Mono",Menlo,monospace;
  --pad:16px;
}
* { box-sizing: border-box; }
html, body {
  margin:0; padding:0;
  background:
    radial-gradient(900px 600px at 20% 0%, #f1ecdf 0%, transparent 50%),
    radial-gradient(800px 700px at 100% 30%, #e5eef2 0%, transparent 55%),
    linear-gradient(180deg, #efe9da 0%, #e9e4d2 100%);
  background-attachment: fixed;
  color: var(--ink);
  font-family: var(--font-sans);
  font-size: 15px; line-height: 1.5;
  -webkit-font-smoothing: antialiased;
}
body { padding-bottom: env(safe-area-inset-bottom); }
a { color: inherit; text-decoration: none; }
.topbar {
  position: sticky; top: 0; z-index: 10;
  background: linear-gradient(180deg, var(--paper) 70%, rgba(244,239,228,0.85) 100%);
  backdrop-filter: blur(10px);
  padding: 12px var(--pad) 10px;
  padding-top: calc(12px + env(safe-area-inset-top));
  border-bottom: 1px solid rgba(230,220,200,0.7);
  display: flex; align-items: center; gap: 10px;
}
.back-btn {
  display: inline-flex; align-items: center; justify-content: center;
  width: 32px; height: 32px; border-radius: 999px;
  background: var(--card); border: 1px solid var(--line);
  color: var(--accent);
}
.wordmark { display: inline-flex; align-items: baseline; gap: 6px; }
.wordmark .wm-praia {
  font-family: var(--font-serif); font-style: italic; font-weight: 400;
  font-size: 26px; line-height: 1; color: var(--accent); letter-spacing: -0.02em;
}
.wordmark .wm-smart {
  font-family: var(--font-sans); font-weight: 700;
  font-size: 17px; color: var(--ink);
}
.subhdr-eyebrow {
  font-family: var(--font-mono); font-size: 10px;
  letter-spacing: 0.08em; color: var(--mute); text-transform: uppercase;
}
main { padding: 20px var(--pad); max-width: 720px; margin: 0 auto; }
.mel-intro {
  font-family: var(--font-serif); font-style: italic;
  font-size: 22px; line-height: 1.25; color: var(--ink);
  margin: 0 0 18px;
}
.mel-intro em { color: var(--accent); font-style: italic; }
.mel-tabs {
  display: flex; gap: 6px; margin-bottom: 14px;
  overflow-x: auto; -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
}
.mel-tabs::-webkit-scrollbar { display: none; }
.mel-tab {
  flex: 0 0 auto;
  display: inline-flex; align-items: center; gap: 5px;
  background: var(--card); color: var(--ink-soft);
  border: 1px solid var(--line);
  border-radius: 999px; padding: 6px 14px;
  font-family: var(--font-mono); font-size: 12px; font-weight: 600;
  letter-spacing: 0.02em;
}
.placeholder-card {
  background: var(--card); border-radius: 18px;
  padding: 28px 20px; text-align: center;
  box-shadow:
    0 1px 0 rgba(0,0,0,0.02),
    0 12px 30px -22px rgba(31,63,77,0.35),
    inset 0 0 0 1px rgba(230,220,200,0.6);
}
.placeholder-card .ico { font-size: 36px; opacity: 0.5; }
.placeholder-card .tag {
  font-family: var(--font-mono); font-size: 10px;
  letter-spacing: 0.08em; color: var(--accent);
  text-transform: uppercase; margin-top: 10px;
}
.placeholder-card p {
  margin: 8px 0 0; color: var(--ink-soft);
  font-family: var(--font-serif); font-style: italic; font-size: 16px;
}
</style>
</head>
<body>
<header class="topbar">
  <a class="back-btn" href="index.html" aria-label="voltar">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M15 6 L 9 12 L 15 18" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
  </a>
  <div class="wordmark"><span class="wm-praia">praia</span><span class="wm-smart">smart</span></div>
  <div style="flex:1"></div>
  <div class="subhdr-eyebrow">melhores</div>
</header>
<main>
  <p class="mel-intro">as <em>melhores praias do Brasil</em> agora — pra surfar, nadar, sol, família, pôr do sol.</p>

  <div class="mel-tabs">
    <span class="mel-tab" style="color:var(--surf);border-color:var(--surf)">surfar</span>
    <span class="mel-tab" style="color:var(--swim);border-color:var(--swim)">nadar</span>
    <span class="mel-tab" style="color:var(--sun);border-color:var(--sun)">sol forte</span>
    <span class="mel-tab" style="color:var(--shade);border-color:var(--shade)">sol tranquilo</span>
  </div>

  <div class="placeholder-card">
    <div class="ico">🏖️</div>
    <div class="tag">em construção</div>
    <p>ranking nacional em breve.</p>
  </div>
</main>
</body>
</html>
